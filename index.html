<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BEBU ❤️ Private Space</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Nunito:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        :root {
            --primary: #ff758c;
            --secondary: #ff7eb3;
            --accent: #ef476f;
            --bg-gradient: linear-gradient(135deg, #fff5f6 0%, #ffffff 100%);
            --glass: rgba(255, 255, 255, 0.75);
            --glass-border: rgba(255, 255, 255, 0.5);
            --text-main: #5d2e36;
            --shadow: 0 10px 30px rgba(255, 117, 140, 0.15);
            --safe-bottom: env(safe-area-inset-bottom);
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            -webkit-tap-highlight-color: transparent; 
        }

        body {
            font-family: 'Nunito', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* --- Animations --- */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-20px); } 100% { transform: translateY(0px); } }
        @keyframes pulseGlow { 0% { box-shadow: 0 0 0 0 rgba(239, 71, 111, 0.4); } 70% { box-shadow: 0 0 0 15px rgba(239, 71, 111, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 71, 111, 0); } }

        /* --- Auth Screen --- */
        #auth-screen {
            position: fixed; inset: 0; z-index: 2000;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            display: flex; align-items: center; justify-content: center;
            transition: all 0.6s ease-in-out;
        }
        #auth-screen.hidden { opacity: 0; pointer-events: none; transform: scale(1.1); }
        
        .auth-card {
            background: var(--glass); backdrop-filter: blur(20px);
            padding: 40px 30px; border-radius: 40px; text-align: center;
            width: 88%; max-width: 400px; border: 1px solid var(--glass-border);
            box-shadow: 0 25px 50px rgba(0,0,0,0.1);
        }

        /* --- Main UI Components --- */
        .glass-card {
            background: var(--glass); backdrop-filter: blur(15px);
            border-radius: 28px; padding: 20px; border: 1px solid var(--glass-border);
            box-shadow: var(--shadow); margin-bottom: 20px;
            animation: fadeIn 0.5s ease-out;
            transition: transform 0.3s ease;
        }
        .glass-card:hover { transform: translateY(-3px); }

        input {
            width: 100%; padding: 15px 20px; margin: 10px 0; border-radius: 15px;
            border: 1px solid rgba(255, 117, 140, 0.2); outline: none;
            background: rgba(255,255,255,0.8); font-size: 1rem;
            transition: 0.3s;
        }
        input:focus { border-color: var(--primary); box-shadow: 0 0 10px rgba(255,117,140,0.1); }

        button {
            border: none; border-radius: 18px; font-weight: 800;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        button:active { transform: scale(0.92); }
        
        .btn-primary {
            background: linear-gradient(45deg, var(--accent), var(--primary));
            color: white; padding: 16px 24px; width: 100%;
            box-shadow: 0 8px 20px rgba(239, 71, 111, 0.3);
        }

        /* --- Monthsary Celebration --- */
        .celebration-banner {
            display: none; background: linear-gradient(45deg, #ffd700, #ff758c);
            color: white; padding: 15px; border-radius: 20px; text-align: center;
            margin-bottom: 20px; font-weight: 800; animation: pulseGlow 2s infinite;
        }

        .counter-grid { display: flex; justify-content: space-around; margin: 20px 0; }
        .count-item { text-align: center; }
        .count-val { font-size: 2.5rem; font-weight: 800; color: var(--accent); display: block; text-shadow: 2px 2px 0px rgba(255,255,255,0.5); }
        .count-lab { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; opacity: 0.6; }

        /* --- Chat System --- */
        #chat-window {
            height: calc(100vh - 320px); overflow-y: auto; padding: 15px;
            display: flex; flex-direction: column; gap: 12px; scrollbar-width: none;
        }
        .msg-group { display: flex; flex-direction: column; max-width: 80%; animation: fadeIn 0.3s ease; }
        .msg-group.me { align-self: flex-end; align-items: flex-end; }
        .msg-group.partner { align-self: flex-start; align-items: flex-start; }

        .bubble {
            padding: 12px 18px; border-radius: 22px; font-size: 0.95rem; line-height: 1.5;
            position: relative; transition: 0.3s;
        }
        .me .bubble { background: linear-gradient(45deg, var(--accent), var(--primary)); color: white; border-bottom-right-radius: 4px; }
        .partner .bubble { background: white; color: var(--text-main); border-bottom-left-radius: 4px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 1px solid var(--glass-border); }
        
        .msg-meta { font-size: 0.6rem; margin: 4px 6px; opacity: 0.5; font-weight: 700; }

        .input-bar {
            display: flex; gap: 10px; background: var(--glass); backdrop-filter: blur(15px);
            padding: 10px 15px; border-radius: 30px; margin: 0 20px 10px;
            border: 1px solid var(--glass-border); box-shadow: var(--shadow);
        }
        #msg-input { border: none; background: transparent; padding: 10px; flex: 1; margin: 0; }

        /* --- Mood System --- */
        .mood-selector { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin: 15px 0; }
        .mood-item {
            font-size: 1.8rem; background: white; height: 60px; display: flex;
            align-items: center; justify-content: center; border-radius: 20px;
            border: 2px solid transparent; transition: 0.3s; box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .mood-item.selected { border-color: var(--accent); background: #fff0f3; transform: scale(1.05); }

        /* --- Navigation --- */
        .nav-bar {
            position: fixed; bottom: calc(15px + var(--safe-bottom)); left: 50%;
            transform: translateX(-50%); width: 92%; max-width: 450px;
            background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(25px);
            border-radius: 35px; padding: 12px; display: flex; justify-content: space-around;
            box-shadow: 0 15px 40px rgba(255, 117, 140, 0.25); z-index: 1000;
            border: 1px solid var(--glass-border);
        }
        .nav-item { color: #d0b0b5; flex: 1; text-align: center; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); padding: 5px; position: relative; }
        .nav-item.active { color: var(--accent); }
        .nav-item.active::after { content: ''; position: absolute; bottom: -5px; left: 50%; transform: translateX(-50%); width: 5px; height: 5px; background: var(--accent); border-radius: 50%; }
        .nav-item i { font-size: 1.3rem; display: block; margin-bottom: 2px; }
        .nav-item span { font-size: 0.65rem; font-weight: 800; display: block; }

        /* --- BG Elements --- */
        #bg-elements { position: fixed; inset: 0; z-index: -1; pointer-events: none; overflow: hidden; }
        .glow-circle {
            position: absolute; width: 300px; height: 300px; border-radius: 50%;
            background: radial-gradient(circle, rgba(255,117,140,0.15) 0%, rgba(255,255,255,0) 70%);
            filter: blur(40px);
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="bg-elements">
        <div class="glow-circle" style="top: -10%; right: -10%;"></div>
        <div class="glow-circle" style="bottom: 10%; left: -10%; background: radial-gradient(circle, rgba(255,126,179,0.1) 0%, rgba(255,255,255,0) 70%);"></div>
        <div id="floating-hearts"></div>
    </div>

    <div id="auth-screen">
        <div class="auth-card">
            <h1 style="font-family: 'Dancing Script'; font-size: 4rem; color: var(--accent); text-shadow: 2px 2px 0 white;">Bebu</h1>
            <p style="letter-spacing: 4px; font-size: 0.75rem; font-weight: 800; margin-bottom: 30px; opacity: 0.6; color: var(--text-main);">PRIVATE SPACE</p>
            <input type="email" id="login-email" placeholder="Email Address">
            <input type="password" id="login-pass" placeholder="Secret Password">
            <button id="btn-login" class="btn-primary" style="margin-top: 20px;">
                <span>Unlock Heart</span> <i class="fas fa-heart"></i>
            </button>
            <p id="auth-err" style="color: var(--accent); font-size: 0.85rem; margin-top: 15px; font-weight: 600;"></p>
        </div>
    </div>

    <div id="app-content" class="hidden" style="flex: 1; overflow-y: auto; padding: 20px 20px 130px;">
        
        <section id="page-home" class="page">
            <div id="monthsary-alert" class="celebration-banner">
                🎊 Happy Monthsary, My Love! ❤️
            </div>

            <div class="glass-card" style="text-align: center; padding: 30px 20px;">
                <h2 style="font-family: 'Dancing Script'; font-size: 2.5rem; color: var(--primary); margin-bottom: 10px;">Together for</h2>
                <div class="counter-grid">
                    <div class="count-item"><span id="y-count" class="count-val">0</span><span class="count-lab">Years</span></div>
                    <div class="count-item"><span id="m-count" class="count-val">0</span><span class="count-lab">Months</span></div>
                    <div class="count-item"><span id="d-count" class="count-val">0</span><span class="count-lab">Days</span></div>
                </div>
                <div style="height: 1px; background: rgba(255,117,140,0.1); margin: 20px 0;"></div>
                <p id="next-m-text" style="font-size: 0.85rem; font-weight: 800; color: var(--primary);"></p>
            </div>

            <div class="glass-card" style="background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; border: none; padding: 25px;">
                <h4 style="margin-bottom: 10px; font-weight: 800;"><i class="fas fa-quote-left"></i> Daily Reminder</h4>
                <p style="font-style: italic; opacity: 0.95; font-size: 1.1rem; line-height: 1.4;">"Every single day with you is my new favorite day, Bebu."</p>
            </div>
        </section>

        <section id="page-chat" class="page hidden">
            <div id="chat-window"></div>
            <div class="input-bar">
                <input type="text" id="msg-input" placeholder="Type a sweet message...">
                <button id="btn-send" style="background: var(--accent); color: white; width: 45px; height: 45px; border-radius: 50%; box-shadow: 0 4px 10px rgba(239, 71, 111, 0.3);">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </section>

        <section id="page-mood" class="page hidden">
            <div class="glass-card">
                <h3 style="text-align: center; margin-bottom: 5px;">My Mood</h3>
                <p style="text-align: center; font-size: 0.8rem; opacity: 0.6; margin-bottom: 15px;">How are you feeling right now?</p>
                <div class="mood-selector" id="mood-options">
                    <div class="mood-item" data-emo="🥰">🥰</div>
                    <div class="mood-item" data-emo="😊">😊</div>
                    <div class="mood-item" data-emo="😴">😴</div>
                    <div class="mood-item" data-emo="😢">😢</div>
                    <div class="mood-item" data-emo="😤">😤</div>
                    <div class="mood-item" data-emo="🥺">🥺</div>
                    <div class="mood-item" data-emo="🔥">🔥</div>
                    <div class="mood-item" data-emo="🍦">🍦</div>
                </div>
                <input type="text" id="mood-note" placeholder="What's on your mind?..." maxlength="120">
                <button id="btn-update-mood" class="btn-primary" style="margin-top: 10px;">Update My Status</button>
            </div>

            <div class="glass-card" style="display: flex; align-items: center; gap: 20px; background: rgba(255,255,255,0.45);">
                <div id="p-mood-emo" style="font-size: 3.5rem; filter: drop-shadow(0 5px 10px rgba(0,0,0,0.1));">✨</div>
                <div style="flex: 1;">
                    <h4 style="font-size: 0.7rem; text-transform: uppercase; color: var(--accent); opacity: 0.7; letter-spacing: 1px;">Partner's Status</h4>
                    <p id="p-mood-note" style="font-weight: 800; margin: 4px 0; font-size: 1.1rem; color: var(--text-main);">Offline</p>
                    <span id="p-mood-time" style="font-size: 0.65rem; opacity: 0.5; font-weight: 700;"></span>
                </div>
            </div>
        </section>
    </div>

    <nav class="nav-bar">
        <div class="nav-item active" onclick="showPage('home', this)"><i class="fas fa-home"></i><span>Home</span></div>
        <div class="nav-item" onclick="showPage('chat', this)"><i class="fas fa-heart"></i><span>Chat</span></div>
        <div class="nav-item" onclick="showPage('mood', this)"><i class="fas fa-face-smile"></i><span>Mood</span></div>
        <div class="nav-item" id="btn-logout"><i class="fas fa-door-open"></i><span>Exit</span></div>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, setDoc, doc, query, orderBy, limit, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAio4XgN8Iq5W7TMx1H7sybgK5PDp1x0j4",
            authDomain: "bebu-chat-91531.firebaseapp.com",
            projectId: "bebu-chat-91531",
            storageBucket: "bebu-chat-91531.firebasestorage.app",
            messagingSenderId: "569412628886",
            appId: "1:569412628886:web:e40f5675a0332aff9a6db7"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- AUTH FLOW ---
        const loginBtn = document.getElementById('btn-login');
        loginBtn.onclick = async () => {
            const email = document.getElementById('login-email').value.trim();
            const pass = document.getElementById('login-pass').value;
            const errEl = document.getElementById('auth-err');
            
            loginBtn.style.opacity = "0.7";
            errEl.innerText = "Opening heart...";

            try {
                await signInWithEmailAndPassword(auth, email, pass);
            } catch (e) {
                errEl.innerText = "Wrong secret, Bebu ❤️";
                loginBtn.style.opacity = "1";
            }
        };

        document.getElementById('btn-logout').onclick = () => signOut(auth);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('app-content').classList.remove('hidden');
                initApp();
            } else {
                document.getElementById('auth-screen').classList.remove('hidden');
                document.getElementById('app-content').classList.add('hidden');
            }
        });

        // --- CORE APP LOGIC ---
        function initApp() {
            updateMonthsary();
            setupChat();
            setupMood();
            createFloatingHearts();
            requestNotifPermission();
        }

        // --- ENHANCED MONTHSARY SYSTEM ---
        function updateMonthsary() {
            const start = new Date("2025-10-25");
            const now = new Date();
            
            let years = now.getFullYear() - start.getFullYear();
            let months = now.getMonth() - start.getMonth();
            let days = now.getDate() - start.getDate();

            if (days < 0) {
                months--;
                const prevMonthLastDay = new Date(now.getFullYear(), now.getMonth(), 0).getDate();
                days += prevMonthLastDay;
            }
            if (months < 0) {
                years--;
                months += 12;
            }

            document.getElementById('y-count').innerText = years;
            document.getElementById('m-count').innerText = months;
            document.getElementById('d-count').innerText = days;

            // celebration on the 25th
            if (now.getDate() === 25) {
                document.getElementById('monthsary-alert').style.display = 'block';
                confetti({ 
                    particleCount: 150, 
                    spread: 70, 
                    origin: { y: 0.6 }, 
                    colors: ['#ff758c', '#ef476f', '#ffd700'] 
                });
                if ("Notification" in window && Notification.permission === "granted") {
                    new Notification("💖 Happy Monthsary, Bebu!");
                }
            }

            // Countdown Logic
            let nextM = new Date(now.getFullYear(), now.getMonth(), 25);
            if (now.getDate() >= 25) nextM.setMonth(nextM.getMonth() + 1);
            const diff = Math.ceil((nextM - now) / (1000 * 60 * 60 * 24));
            document.getElementById('next-m-text').innerHTML = `<i class="fas fa-hourglass-half"></i> ${diff} days until our next monthsary ✨`;
        }

        // --- STABLE CHAT SYSTEM ---
        let chatUnsub = null;
        function setupChat() {
            if (chatUnsub) chatUnsub();
            const chatWin = document.getElementById('chat-window');
            const q = query(collection(db, "messages"), orderBy("timestamp", "asc"), limit(60));
            
            chatUnsub = onSnapshot(q, (snap) => {
                chatWin.innerHTML = ""; 
                snap.forEach(d => {
                    const m = d.data();
                    if (!m.timestamp) return;

                    const isMe = m.uid === auth.currentUser.uid;
                    const div = document.createElement('div');
                    div.className = `msg-group ${isMe ? 'me' : 'partner'}`;
                    
                    const time = m.timestamp.toDate().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                    
                    div.innerHTML = `
                        <div class="bubble">${m.text}</div>
                        <span class="msg-meta">${time}</span>
                    `;
                    chatWin.appendChild(div);
                });
                chatWin.scrollTo({ top: chatWin.scrollHeight, behavior: 'smooth' });
            });
        }

        document.getElementById('btn-send').onclick = async () => {
            const input = document.getElementById('msg-input');
            const text = input.value.trim();
            if (!text) return;
            input.value = "";
            await addDoc(collection(db, "messages"), {
                text,
                uid: auth.currentUser.uid,
                timestamp: serverTimestamp()
            });
        };

        // --- ENHANCED MOOD SYSTEM ---
        let selectedEmoji = "🥰";
        document.querySelectorAll('.mood-item').forEach(item => {
            item.onclick = () => {
                document.querySelectorAll('.mood-item').forEach(i => i.classList.remove('selected'));
                item.classList.add('selected');
                selectedEmoji = item.dataset.emo;
            };
        });

        document.getElementById('btn-update-mood').onclick = async () => {
            const note = document.getElementById('mood-note').value.trim();
            const btn = document.getElementById('btn-update-mood');
            btn.innerText = "Updating...";
            
            await setDoc(doc(db, "moods", auth.currentUser.uid), {
                emoji: selectedEmoji,
                note: note || "Feeling good!",
                timestamp: serverTimestamp()
            });
            
            btn.innerText = "Update My Status";
            document.getElementById('mood-note').value = "";
        };

        function setupMood() {
            onSnapshot(collection(db, "moods"), (snap) => {
                snap.forEach(d => {
                    if (d.id !== auth.currentUser.uid) {
                        const data = d.data();
                        document.getElementById('p-mood-emo').innerText = data.emoji;
                        document.getElementById('p-mood-note').innerText = data.note ? `"${data.note}"` : "No status note";
                        if (data.timestamp) {
                            const t = data.timestamp.toDate();
                            document.getElementById('p-mood-time').innerText = `Updated ${t.getHours()}:${t.getMinutes().toString().padStart(2, '0')}`;
                        }
                    }
                });
            });
        }

        // --- NAVIGATION ENGINE ---
        window.showPage = (id, el) => {
            document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
            document.getElementById('page-' + id).classList.remove('hidden');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
            if (id === 'chat') {
                const win = document.getElementById('chat-window');
                win.scrollTop = win.scrollHeight;
            }
        };

        // --- VISUAL FX ---
        function createFloatingHearts() {
            const container = document.getElementById('floating-hearts');
            const hearts = ['❤️', '💖', '✨', '🌸'];
            for (let i = 0; i < 12; i++) {
                const heart = document.createElement('div');
                heart.innerText = hearts[Math.floor(Math.random() * hearts.length)];
                heart.style.cssText = `
                    position: absolute;
                    left: ${Math.random() * 100}vw;
                    top: ${Math.random() * 100}vh;
                    opacity: 0.15;
                    font-size: ${Math.random() * 20 + 15}px;
                    animation: float ${Math.random() * 3 + 4}s infinite ease-in-out;
                    z-index: -1;
                `;
                container.appendChild(heart);
            }
        }

        function requestNotifPermission() {
            if ("Notification" in window) Notification.requestPermission();
        }
    </script>
</body>
</html>
