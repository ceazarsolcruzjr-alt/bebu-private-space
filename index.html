<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <title>BEBU ❤️ Private Space</title>

    

    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    

    <style>

        :root {

            --primary: #ff6b81;

            --primary-light: #ff8fa3;

            --accent: #e63946;

            --bg-soft: #fff5f6;

            --glass: rgba(255, 255, 255, 0.85);

            --glass-border: rgba(255, 255, 255, 0.6);

            --text-dark: #4d1d23;

            --shadow-red: 0 12px 40px rgba(255, 107, 129, 0.2);

        }



        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }



        body {

            font-family: 'Nunito', sans-serif;

            background: radial-gradient(circle at top right, #fff0f3, #fff);

            color: var(--text-dark);

            height: 100dvh; /* Dynamic viewport height for mobile */

            overflow: hidden;

            display: flex;

            flex-direction: column;

        }



        #bg-canvas { position: fixed; inset: 0; z-index: -1; pointer-events: none; }

        .bg-heart {

            position: absolute; color: var(--primary-light); opacity: 0.15;

            animation: floatUp 15s infinite linear;

        }

        @keyframes floatUp {

            0% { transform: translateY(110vh) rotate(0deg) scale(0.8); opacity: 0; }

            10% { opacity: 0.2; }

            90% { opacity: 0.1; }

            100% { transform: translateY(-20vh) rotate(360deg) scale(1.2); opacity: 0; }

        }



        /* --- AUTH SCREEN --- */

        #auth-screen {

            position: fixed; inset: 0; z-index: 2000;

            background: linear-gradient(135deg, #ff6b81, #ff9a9e);

            display: flex; align-items: center; justify-content: center;

            transition: opacity 0.5s ease;

        }

        #auth-screen.hidden { opacity: 0; pointer-events: none; }

        .auth-card {

            background: rgba(255, 255, 255, 0.95); padding: 3rem 2rem; border-radius: 40px;

            text-align: center; width: 85%; max-width: 380px; box-shadow: 0 30px 60px rgba(0,0,0,0.1);

        }



        /* --- LAYOUT STRUCTURE --- */

        #app-content { 

            display: none; 

            flex: 1; 

            overflow-y: auto; 

            padding: 20px 20px 100px; /* Space for Nav */

            position: relative;

        }

        .page { display: none; animation: fadeIn 0.4s ease-out; max-width: 600px; margin: 0 auto; }

        .page.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }



        .card { 

            background: var(--glass); backdrop-filter: blur(15px);

            padding: 20px; border-radius: 28px; margin-bottom: 20px;

            border: 1px solid var(--glass-border); box-shadow: var(--shadow-red);

        }



        /* --- ANNIVERSARY TRACKER --- */

        .tracker-container { text-align: center; padding: 30px 10px; }

        #anniversary-text { font-family: 'Dancing Script', cursive; font-size: 1.8rem; color: var(--accent); margin-bottom: 10px; }

        .time-unit { display: inline-block; margin: 0 8px; }

        .time-val { font-size: 2.5rem; font-weight: 800; color: var(--accent); display: block; }

        .time-lab { font-size: 0.7rem; letter-spacing: 2px; font-weight: 700; opacity: 0.6; }



        /* --- CHAT --- */

        #chat-window { 

            height: 60vh; overflow-y: auto; padding: 10px; 

            display: flex; flex-direction: column; gap: 12px;

            scroll-behavior: smooth;

        }

        .bubble { 

            padding: 12px 16px; border-radius: 22px; font-size: 0.95rem; max-width: 80%;

            line-height: 1.4; position: relative; animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);

        }

        @keyframes pop { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .bubble.me { align-self: flex-end; background: linear-gradient(135deg, var(--primary), var(--accent)); color: white; border-bottom-right-radius: 4px; }

        .bubble.partner { align-self: flex-start; background: white; border-bottom-left-radius: 4px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }

        .ts { font-size: 0.65rem; opacity: 0.6; margin-top: 4px; display: block; text-align: right; }



        .chat-input-area { 

            display: flex; gap: 8px; background: white; padding: 8px 12px; 

            border-radius: 30px; box-shadow: var(--shadow-red); margin-top: 10px;

        }

        .chat-input-area input { flex: 1; border: none; outline: none; padding: 8px; }



        /* --- MOOD --- */

        .mood-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 15px 0; }

        .mood-btn { font-size: 1.8rem; background: #fff; border-radius: 15px; padding: 10px 0; border: 2px solid transparent; cursor: pointer; transition: 0.3s; }

        .mood-btn.selected { border-color: var(--primary); background: var(--bg-soft); }

        #mood-msg { width: 100%; padding: 12px; border-radius: 15px; border: 1px solid #eee; margin-top: 10px; font-family: inherit; }



        /* --- GALLERY --- */

        .gallery-grid { 

            display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; 

        }

        .gallery-item { 

            aspect-ratio: 1; width: 100%; border-radius: 18px; object-fit: cover; 

            background: #eee; border: 3px solid white; box-shadow: 0 5px 15px rgba(0,0,0,0.05);

        }



        /* --- NAV --- */

        .nav-bar {

            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);

            width: 90%; max-width: 400px; background: rgba(255,255,255,0.9);

            backdrop-filter: blur(20px); border-radius: 30px; padding: 10px;

            display: flex; justify-content: space-around; z-index: 1500;

            box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 1px solid var(--glass-border);

        }

        .nav-tab { color: #bbb; text-align: center; flex: 1; cursor: pointer; transition: 0.3s; }

        .nav-tab.active { color: var(--accent); }

        .nav-tab i { font-size: 1.2rem; display: block; }

        .nav-tab span { font-size: 0.6rem; font-weight: 800; text-transform: uppercase; }



        /* --- UTILS --- */

        .click-heart { position: fixed; color: var(--accent); pointer-events: none; z-index: 3000; animation: heartPop 0.8s ease-out forwards; }

        @keyframes heartPop { 0% { transform: scale(0); opacity: 1; } 100% { transform: scale(2.5) translateY(-50px); opacity: 0; } }

        

        .notification {

            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);

            background: var(--accent); color: white; padding: 15px 25px;

            border-radius: 20px; z-index: 2500; box-shadow: 0 10px 20px rgba(0,0,0,0.2);

            animation: slideDown 0.5s ease forwards;

        }

        @keyframes slideDown { from { top: -100px; } to { top: 20px; } }

    </style>

</head>

<body>



    <div id="bg-canvas"></div>

    <div id="notification-container"></div>



    <div id="auth-screen">

        <div class="auth-card">

            <h1 style="font-family: 'Dancing Script', cursive; font-size: 3.5rem; color: var(--accent);">Bebu</h1>

            <p style="color: var(--primary); font-weight: 700; margin-bottom: 20px;">🔒 PRIVATE SPACE</p>

            <input type="email" id="email" placeholder="Email" style="width: 100%; padding: 15px; margin: 5px 0; border-radius: 15px; border: 1px solid #ddd;">

            <input type="password" id="password" placeholder="Password" style="width: 100%; padding: 15px; margin: 5px 0; border-radius: 15px; border: 1px solid #ddd;">

            <button id="login-btn" style="width: 100%; padding: 15px; margin-top: 15px; border: none; border-radius: 15px; background: var(--accent); color: white; font-weight: 700;">Unlock ❤️</button>

            <p id="auth-error" style="color: var(--accent); font-size: 0.8rem; margin-top: 10px;"></p>

        </div>

    </div>



    <div id="app-content">

        <section id="page-home" class="page active">

            <div class="card tracker-container">

                <p id="anniversary-text">We've been together for</p>

                <div id="enhanced-counter">

                    <div class="time-unit"><span class="time-val" id="count-y">0</span><span class="time-lab">YEARS</span></div>

                    <div class="time-unit"><span class="time-val" id="count-m">0</span><span class="time-lab">MONTHS</span></div>

                    <div class="time-unit"><span class="time-val" id="count-d">0</span><span class="time-lab">DAYS</span></div>

                </div>

            </div>

            

            <div class="card" style="background: linear-gradient(135deg, var(--primary), var(--primary-light)); color: white; border: none;">

                <h4 style="margin-bottom: 8px;"><i class="fas fa-calendar-heart"></i> Monthsary History</h4>

                <div id="monthsary-timeline" style="font-size: 0.85rem; max-height: 150px; overflow-y: auto; opacity: 0.9;">

                    Loading sweet memories...

                </div>

            </div>

        </section>



        <section id="page-chat" class="page">

            <div class="card" style="padding: 10px;">

                <div id="chat-window"></div>

                <div class="chat-input-area">

                    <input type="text" id="msg-input" placeholder="Type a sweet message...">

                    <button id="send-msg" style="background: var(--accent); color: white; border: none; width: 40px; height: 40px; border-radius: 50%;"><i class="fas fa-paper-plane"></i></button>

                </div>

            </div>

        </section>



        <section id="page-gallery" class="page">

            <div class="card">

                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">

                    <h2 style="font-family: 'Dancing Script', cursive; color: var(--accent);">Our Moments</h2>

                    <label class="btn-send" style="cursor: pointer; display: flex; align-items: center; justify-content: center; background: var(--primary); color: white; width: 45px; height: 45px; border-radius: 15px;">

                        <i class="fas fa-plus"></i>

                        <input type="file" id="photo-upload" hidden accept="image/*">

                    </label>

                </div>

                <div class="gallery-grid" id="gallery-container"></div>

            </div>

        </section>



        <section id="page-mood" class="page">

            <div class="card">

                <h4 style="color: var(--accent); text-align: center;">How are you, Bebu?</h4>

                <div class="mood-grid">

                    <div class="mood-btn" data-emoji="😊">😊</div>

                    <div class="mood-btn" data-emoji="🥰">🥰</div>

                    <div class="mood-btn" data-emoji="🥺">🥺</div>

                    <div class="mood-btn" data-emoji="😴">😴</div>

                    <div class="mood-btn" data-emoji="😤">😤</div>

                    <div class="mood-btn" data-emoji="🍦">🍦</div>

                    <div class="mood-btn" data-emoji="🍕">🍕</div>

                    <div class="mood-btn" data-emoji="🌹">🌹</div>

                </div>

                <textarea id="mood-msg" placeholder="Write a short note about your mood..."></textarea>

                <button id="save-mood" style="width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 12px; margin-top: 10px; font-weight: 700;">Update Status</button>

            </div>



            <div class="card" id="partner-status-card" style="display: flex; align-items: center; gap: 15px; background: white;">

                <div id="p-emoji" style="font-size: 3rem;">❓</div>

                <div style="flex: 1;">

                    <h4 style="color: var(--primary); font-size: 0.9rem;">Partner's Status</h4>

                    <p id="p-msg" style="font-size: 0.85rem; font-style: italic; color: #666;">No update yet</p>

                    <small id="p-time" style="font-size: 0.65rem; opacity: 0.5;"></small>

                </div>

            </div>

        </section>

    </div>



    <nav class="nav-bar">

        <div class="nav-tab active" onclick="nav('home')"><i class="fas fa-heart"></i><span>Home</span></div>

        <div class="nav-tab" onclick="nav('chat')"><i class="fas fa-comment-dots"></i><span>Chat</span></div>

        <div class="nav-tab" onclick="nav('gallery')"><i class="fas fa-images"></i><span>Gallery</span></div>

        <div class="nav-tab" onclick="nav('mood')"><i class="fas fa-smile"></i><span>Mood</span></div>

        <div class="nav-tab" id="logout-btn"><i class="fas fa-door-open"></i><span>Exit</span></div>

    </nav>



    <script type="module">

        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        import { getFirestore, collection, addDoc, setDoc, doc, query, orderBy, onSnapshot, serverTimestamp, limit } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";



        const firebaseConfig = {

            apiKey: "AIzaSyAio4XgN8Iq5W7TMx1H7sybgK5PDp1x0j4",

            authDomain: "bebu-chat-91531.firebaseapp.com",

            projectId: "bebu-chat-91531",

            storageBucket: "bebu-chat-91531.firebasestorage.app",

            messagingSenderId: "569412628886",

            appId: "1:569412628886:web:e40f5675a0332aff9a6db7"

        };



        const app = initializeApp(firebaseConfig);

        const auth = getAuth(app);

        const db = getFirestore(app);

        const storage = getStorage(app);



        const ALLOWED_USERS = ['ceazarsolcruzjr@gmail.com', 'nazarenolovelyjoy4@gmail.com'];

        let currentEmoji = "😊";

        const REL_START_DATE = "2025-10-25";



        // --- AUTH LOGIC ---

        document.getElementById('login-btn').onclick = async () => {

            const email = document.getElementById('email').value.trim();

            const pass = document.getElementById('password').value;

            if(!ALLOWED_USERS.includes(email.toLowerCase())) {

                showError("Access Denied 🔒");

                return;

            }

            try {

                await signInWithEmailAndPassword(auth, email, pass);

            } catch (e) {

                showError("Incorrect password, Bebu ❤️");

            }

        };



        onAuthStateChanged(auth, (user) => {

            const authScreen = document.getElementById('auth-screen');

            const appContent = document.getElementById('app-content');

            if (user) {

                authScreen.classList.add('hidden');

                appContent.style.display = 'block';

                initApp();

            } else {

                authScreen.classList.remove('hidden');

                appContent.style.display = 'none';

            }

        });



        document.getElementById('logout-btn').onclick = () => signOut(auth);



        function initApp() {

            updateCounter();

            setInterval(updateCounter, 1000 * 60 * 60); // Update every hour

            checkMonthsary();

            listenChat();

            listenMood();

            listenGallery();

            renderMonthsaryHistory();

        }



        // --- ENHANCED COUNTER ---

        function updateCounter() {

            const start = new Date(REL_START_DATE);

            const now = new Date();

            

            let years = now.getFullYear() - start.getFullYear();

            let months = now.getMonth() - start.getMonth();

            let days = now.getDate() - start.getDate();



            if (days < 0) {

                months--;

                days += new Date(now.getFullYear(), now.getMonth(), 0).getDate();

            }

            if (months < 0) {

                years--;

                months += 12;

            }



            document.getElementById('count-y').innerText = years;

            document.getElementById('count-m').innerText = months;

            document.getElementById('count-d').innerText = days;

        }



        function checkMonthsary() {

            const now = new Date();

            const relDay = new Date(REL_START_DATE).getDate();

            if (now.getDate() === relDay) {

                notify("Happy Monthsary, Bebu! ❤️");

            }

        }



        function renderMonthsaryHistory() {

            const start = new Date(REL_START_DATE);

            const now = new Date();

            const container = document.getElementById('monthsary-timeline');

            container.innerHTML = "";

            

            let tempDate = new Date(start);

            while (tempDate <= now) {

                if (tempDate > start) {

                    const line = document.createElement('div');

                    line.style.padding = "5px 0";

                    line.innerHTML = `❤️ <strong>${tempDate.toLocaleDateString('en-US', {month:'long', year:'numeric'})}</strong> - Another month of us!`;

                    container.prepend(line);

                }

                tempDate.setMonth(tempDate.getMonth() + 1);

            }

        }



        // --- CHAT UPGRADE ---

        async function sendMsg() {

            const input = document.getElementById('msg-input');

            const text = input.value.trim();

            if(!text) return;

            input.value = "";

            await addDoc(collection(db, "messages"), {

                text, uid: auth.currentUser.uid, timestamp: serverTimestamp()

            });

        }

        document.getElementById('send-msg').onclick = sendMsg;

        document.getElementById('msg-input').onkeydown = (e) => e.key === 'Enter' && sendMsg();



        function listenChat() {

            const q = query(collection(db, "messages"), orderBy("timestamp", "asc"), limit(100));

            onSnapshot(q, (snap) => {

                const chatWin = document.getElementById('chat-window');

                chatWin.innerHTML = "";

                snap.forEach(d => {

                    const m = d.data();

                    const isMe = m.uid === auth.currentUser.uid;

                    const time = m.timestamp ? new Date(m.timestamp.toDate()).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : '...';

                    chatWin.innerHTML += `

                        <div class="bubble ${isMe ? 'me' : 'partner'}">

                            ${m.text}

                            <span class="ts">${time}</span>

                        </div>`;

                });

                chatWin.scrollTop = chatWin.scrollHeight;

            });

        }



        // --- MOOD UPGRADE ---

        document.querySelectorAll('.mood-btn').forEach(btn => {

            btn.onclick = () => {

                document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('selected'));

                btn.classList.add('selected');

                currentEmoji = btn.dataset.emoji;

            };

        });



        document.getElementById('save-mood').onclick = async () => {

            const msg = document.getElementById('mood-msg').value.trim();

            if(!msg) { alert("Please add a small note!"); return; }

            await setDoc(doc(db, "moods", auth.currentUser.uid), {

                emoji: currentEmoji,

                message: msg,

                timestamp: serverTimestamp()

            });

            notify("Status updated! ✨");

            document.getElementById('mood-msg').value = "";

        };



        function listenMood() {

            onSnapshot(collection(db, "moods"), (snap) => {

                snap.forEach(d => {

                    if(d.id !== auth.currentUser.uid) {

                        const data = d.data();

                        document.getElementById('p-emoji').innerText = data.emoji;

                        document.getElementById('p-msg').innerText = `"${data.message}"`;

                        document.getElementById('p-time').innerText = data.timestamp ? `Updated ${new Date(data.timestamp.toDate()).toLocaleString()}` : '';

                    }

                });

            });

        }



        // --- GALLERY ---

        document.getElementById('photo-upload').onchange = async (e) => {

            const file = e.target.files[0];

            if(!file) return;

            notify("Uploading memory... 📸");

            const refImg = ref(storage, `gallery/${Date.now()}_${file.name}`);

            await uploadBytes(refImg, file);

            const url = await getDownloadURL(refImg);

            await addDoc(collection(db, "photos"), { url, timestamp: serverTimestamp() });

        };



        function listenGallery() {

            const q = query(collection(db, "photos"), orderBy("timestamp", "desc"));

            onSnapshot(q, (snap) => {

                const container = document.getElementById('gallery-container');

                container.innerHTML = "";

                snap.forEach(d => {

                    const img = document.createElement('img');

                    img.src = d.data().url;

                    img.className = 'gallery-item';

                    img.onclick = () => window.open(d.data().url, '_blank'); // Simple fullscreen

                    container.appendChild(img);

                });

            });

        }



        // --- UI HELPERS ---

        window.nav = (id) => {

            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));

            document.getElementById('page-'+id).classList.add('active');

            document.querySelectorAll('.nav-tab').forEach(t => {

                t.classList.remove('active');

                if(t.innerText.toLowerCase().includes(id)) t.classList.add('active');

            });

        };



        function notify(text) {

            const n = document.createElement('div');

            n.className = 'notification';

            n.innerText = text;

            document.getElementById('notification-container').appendChild(n);

            setTimeout(() => n.remove(), 3000);

        }



        function showError(text) {

            document.getElementById('auth-error').innerText = text;

        }



        // --- BACKGROUND EFFECT ---

        const bg = document.getElementById('bg-canvas');

        for(let i=0; i<15; i++) {

            const h = document.createElement('i');

            h.className = 'fas fa-heart bg-heart';

            h.style.left = Math.random() * 100 + 'vw';

            h.style.animationDelay = Math.random() * 15 + 's';

            h.style.fontSize = (Math.random() * 15 + 10) + 'px';

            bg.appendChild(h);

        }



        document.addEventListener('click', (e) => {

            const h = document.createElement('i');

            h.className = 'fas fa-heart click-heart';

            h.style.left = (e.clientX - 10) + 'px';

            h.style.top = (e.clientY - 10) + 'px';

            document.body.appendChild(h);

            setTimeout(() => h.remove(), 800);

        });



    </script>

</body>

</html>
