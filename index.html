
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BEBU ❤️ Private Space</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #ff6b81;
            --primary-light: #ff8fa3;
            --accent: #e63946;
            --bg-soft: #fff5f6;
            --glass: rgba(255, 255, 255, 0.82);
            --glass-border: rgba(255, 255, 255, 0.7);
            --text-dark: #4d1d23;
            --shadow-red: 0 15px 35px rgba(255, 107, 129, 0.18);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Nunito', sans-serif;
            background: radial-gradient(circle at top right, #fff0f3, #fff);
            color: var(--text-dark);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        #bg-canvas { position: fixed; inset: 0; z-index: -1; pointer-events: none; }
        .bg-heart { position: absolute; color: var(--primary-light); opacity: 0.15; animation: floatUp 15s infinite linear; }
        @keyframes floatUp {
            0% { transform: translateY(110vh) rotate(0deg) scale(0.8); opacity: 0; }
            10% { opacity: 0.2; }
            90% { opacity: 0.1; }
            100% { transform: translateY(-20vh) rotate(360deg) scale(1.2); opacity: 0; }
        }

        .card { 
            background: var(--glass); backdrop-filter: blur(16px);
            padding: 25px; border-radius: 30px; margin-bottom: 20px;
            box-shadow: var(--shadow-red); border: 1px solid var(--glass-border);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        button { transition: all 0.2s ease; cursor: pointer; }
        button:active { transform: scale(0.92); }

        /* --- AUTH SCREEN --- */
        #auth-screen {
            position: fixed; inset: 0; z-index: 1000;
            background: linear-gradient(135deg, #ff6b81, #ff9a9e);
            display: flex; align-items: center; justify-content: center;
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #auth-screen.hidden { opacity: 0; pointer-events: none; transform: scale(1.1); }
        .auth-card {
            background: rgba(255, 255, 255, 0.92); backdrop-filter: blur(25px);
            padding: 3rem 2rem; border-radius: 40px; text-align: center;
            width: 85%; max-width: 380px; box-shadow: 0 30px 60px rgba(0,0,0,0.15);
        }
        .auth-card h1 { font-family: 'Dancing Script', cursive; font-size: 3.8rem; color: var(--accent); }
        .auth-card input { 
            width: 100%; padding: 16px; margin: 8px 0; border-radius: 18px;
            border: 1px solid rgba(255, 107, 129, 0.2); outline: none;
        }

        /* --- COUNTER UPGRADE --- */
        .counter-container { display: flex; justify-content: center; gap: 15px; margin: 15px 0; }
        .counter-box { text-align: center; flex: 1; }
        .counter-val { 
            font-size: 2.2rem; font-weight: 800; display: block;
            background: linear-gradient(to bottom, var(--accent), var(--primary));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: softPulse 4s infinite ease-in-out;
        }
        .counter-label { font-size: 0.65rem; font-weight: 800; letter-spacing: 2px; opacity: 0.6; text-transform: uppercase; }
        @keyframes softPulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.08); opacity: 0.8; } }

        /* --- CHAT UPGRADE --- */
        #chat-window { 
            height: calc(100vh - 280px); overflow-y: auto; padding: 10px; 
            display: flex; flex-direction: column; gap: 12px; scrollbar-width: none;
        }
        .msg-row { display: flex; align-items: flex-end; gap: 8px; margin-bottom: 4px; animation: msgPop 0.3s ease-out; }
        .msg-row.me { flex-direction: row-reverse; }
        
        .avatar { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; border: 2px solid white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); background: var(--primary-light); display: flex; align-items: center; justify-content: center; color: white; font-size: 0.8rem; flex-shrink: 0; }
        
        .bubble { 
            padding: 12px 16px; border-radius: 20px; font-size: 0.95rem; max-width: 70%;
            line-height: 1.4; box-shadow: 0 4px 15px rgba(0,0,0,0.03);
        }
        .bubble.me { background: linear-gradient(135deg, var(--primary), var(--accent)); color: white; border-bottom-right-radius: 4px; box-shadow: 0 4px 12px rgba(230,57,70,0.2); }
        .bubble.partner { background: white; color: var(--text-dark); border-bottom-left-radius: 4px; }
        
        .loc-tag { font-size: 0.65rem; display: block; margin-top: 4px; opacity: 0.8; font-weight: 600; }
        @keyframes msgPop { from { opacity: 0; transform: translateY(10px) scale(0.95); } to { opacity: 1; transform: translateY(0) scale(1); } }

        .chat-input-area { 
            display: flex; gap: 10px; background: #fff; padding: 8px 12px; 
            border-radius: 35px; box-shadow: var(--shadow-red); margin-top: 5px;
            border: 1px solid transparent; transition: 0.3s;
        }
        .chat-input-area:focus-within { border-color: var(--primary-light); box-shadow: 0 0 15px rgba(255,107,129,0.2); }
        .chat-input-area input { flex: 1; border: none; outline: none; padding: 10px; font-size: 1rem; background: transparent; }
        
        /* --- NAV --- */
        .nav-bar {
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 450px; background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px); border-radius: 35px; padding: 10px;
            display: flex; justify-content: space-around; box-shadow: var(--shadow-red); z-index: 900;
        }
        .nav-tab { color: #d1d1d1; transition: 0.3s; text-align: center; flex: 1; padding: 5px; }
        .nav-tab.active { color: var(--accent); filter: drop-shadow(0 0 5px rgba(230,57,70,0.3)); transform: translateY(-5px); }
        .nav-tab span { display: block; font-size: 0.6rem; font-weight: 800; margin-top: 2px; }

        .click-heart { position: fixed; color: var(--accent); pointer-events: none; z-index: 9999; animation: heartPop 0.7s ease-out forwards; }
        @keyframes heartPop { 0% { transform: scale(0); opacity: 1; } 100% { transform: scale(2.5) translateY(-40px); opacity: 0; } }
    </style>
</head>
<body>

    <div id="bg-canvas"></div>

    <div id="auth-screen">
        <div class="auth-card">
            <h1>Bebu</h1>
            <p style="color: var(--primary); font-weight: 700; margin-bottom: 20px; letter-spacing: 1px;">PRIVATE SPACE</p>
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="password" placeholder="Password">
            <button id="login-btn" style="width: 100%; padding: 18px; margin-top: 15px; border: none; border-radius: 18px; background: linear-gradient(45deg, var(--accent), var(--primary)); color: white; font-weight: 700;">Unlock ❤️</button>
            <p id="auth-error" style="color: var(--accent); font-size: 0.8rem; margin-top: 15px;"></p>
        </div>
    </div>

    <div id="app-content" style="display: none; flex: 1; overflow-y: auto; padding: 20px 20px 100px;">
        <section id="page-home" class="page" style="display: none;">
            <div class="card home-hero" style="text-align: center;">
                <p style="font-family: 'Dancing Script', cursive; font-size: 2.2rem; color: var(--primary);">Lovingly together for</p>
                <div class="counter-container">
                    <div class="counter-box"><span id="count-y" class="counter-val">0</span><span class="counter-label">Years</span></div>
                    <div class="counter-box"><span id="count-m" class="counter-val">0</span><span class="counter-label">Months</span></div>
                    <div class="counter-box"><span id="count-d" class="counter-val">0</span><span class="counter-label">Days</span></div>
                </div>
                <p style="font-size: 0.75rem; opacity: 0.5; font-weight: 700;">Since October 25, 2025</p>
            </div>
            
            <div class="card" style="background: linear-gradient(135deg, var(--primary), var(--primary-light)); color: white; border: none;">
                <h4 style="margin-bottom: 10px;"><i class="fas fa-heart"></i> Daily Note</h4>
                <p id="quote-display" style="font-style: italic; opacity: 0.9;">"Every moment with you is a treasure I keep in my heart."</p>
            </div>
        </section>

        <section id="page-chat" class="page" style="display: none;">
            <div id="chat-window"></div>
            <div class="chat-input-area">
                <input type="text" id="msg-input" placeholder="Say something sweet...">
                <button id="send-msg" style="width: 42px; height: 42px; border-radius: 50%; background: var(--accent); color: white; border: none; box-shadow: 0 4px 10px rgba(230,57,70,0.2);"><i class="fas fa-paper-plane"></i></button>
            </div>
        </section>

        <section id="page-gallery" class="page" style="display: none;">
            <div class="card" style="padding: 15px;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                    <h2 style="font-family: 'Dancing Script', cursive; color: var(--accent);">Our Gallery</h2>
                    <input type="file" id="photo-upload" style="display: none;">
                    <button onclick="document.getElementById('photo-upload').click()" style="background: var(--primary); border: none; color: white; padding: 10px 18px; border-radius: 12px;"><i class="fas fa-camera"></i></button>
                </div>
                <div class="gallery-wall" id="gallery-container" style="columns: 2; column-gap: 12px;"></div>
            </div>
        </section>

        <section id="page-mood" class="page" style="display: none;">
            <div class="card" style="text-align: center;">
                <h4 style="color: var(--accent); margin-bottom: 5px;">My Mood</h4>
                <div class="mood-grid" style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 15px 0;">
                    <div class="mood-btn" onclick="updateMood('😊', this)" style="font-size: 2rem; background: white; border-radius: 18px; padding: 12px 0;">😊</div>
                    <div class="mood-btn" onclick="updateMood('🥰', this)" style="font-size: 2rem; background: white; border-radius: 18px; padding: 12px 0;">🥰</div>
                    <div class="mood-btn" onclick="updateMood('😴', this)" style="font-size: 2rem; background: white; border-radius: 18px; padding: 12px 0;">😴</div>
                    <div class="mood-btn" onclick="updateMood('😢', this)" style="font-size: 2rem; background: white; border-radius: 18px; padding: 12px 0;">😢</div>
                    <div class="mood-btn" onclick="updateMood('😤', this)" style="font-size: 2rem; background: white; border-radius: 18px; padding: 12px 0;">😤</div>
                    <div class="mood-btn" onclick="updateMood('🍦', this)" style="font-size: 2rem; background: white; border-radius: 18px; padding: 12px 0;">🍦</div>
                    <div class="mood-btn" onclick="updateMood('🌹', this)" style="font-size: 2rem; background: white; border-radius: 18px; padding: 12px 0;">🌹</div>
                    <div class="mood-btn" onclick="updateMood('💌', this)" style="font-size: 2rem; background: white; border-radius: 18px; padding: 12px 0;">💌</div>
                </div>
            </div>
            <div class="card" style="display: flex; align-items: center; gap: 20px; background: rgba(255,255,255,0.5);">
                <div id="partner-emoji" style="font-size: 3rem;">...</div>
                <div>
                    <h4 style="color: var(--primary); font-size: 0.9rem;">Partner's Status</h4>
                    <p id="partner-status-text" style="font-size: 0.8rem; opacity: 0.7;">Updated just now</p>
                </div>
            </div>
        </section>
    </div>

    <nav class="nav-bar">
        <div class="nav-tab active" onclick="nav('home', this)"><i class="fas fa-home"></i><span>HOME</span></div>
        <div class="nav-tab" onclick="nav('chat', this)"><i class="fas fa-heart"></i><span>CHAT</span></div>
        <div class="nav-tab" onclick="nav('gallery', this)"><i class="fas fa-images"></i><span>GALLERY</span></div>
        <div class="nav-tab" onclick="nav('mood', this)"><i class="fas fa-smile"></i><span>MOOD</span></div>
        <div class="nav-tab" id="logout-btn"><i class="fas fa-power-off"></i><span>EXIT</span></div>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, setDoc, doc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAio4XgN8Iq5W7TMx1H7sybgK5PDp1x0j4",
            authDomain: "bebu-chat-91531.firebaseapp.com",
            projectId: "bebu-chat-91531",
            storageBucket: "bebu-chat-91531.firebasestorage.app",
            messagingSenderId: "569412628886",
            appId: "1:569412628886:web:e40f5675a0332aff9a6db7"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const storage = getStorage(app);

        const ALLOWED_USERS = ['ceazarsolcruzjr@gmail.com', 'nazarenolovelyjoy4@gmail.com'];
        let currentLocation = null;

        // --- BG & CLICK EFFECTS ---
        const bg = document.getElementById('bg-canvas');
        for(let i=0; i<15; i++) {
            const h = document.createElement('i');
            h.className = 'fas fa-heart bg-heart';
            h.style.left = Math.random() * 100 + 'vw';
            h.style.animationDelay = Math.random() * 15 + 's';
            h.style.fontSize = (Math.random() * 15 + 10) + 'px';
            bg.appendChild(h);
        }

        document.addEventListener('click', (e) => {
            if(e.target.closest('button') || e.target.closest('.nav-tab')) {
                if(navigator.vibrate) navigator.vibrate(10);
            }
            const h = document.createElement('i');
            h.className = 'fas fa-heart click-heart';
            h.style.left = (e.clientX - 10) + 'px';
            h.style.top = (e.clientY - 10) + 'px';
            document.body.appendChild(h);
            setTimeout(() => h.remove(), 700);
        });

        // --- AUTH ---
        document.getElementById('login-btn').onclick = async () => {
            const email = document.getElementById('email').value.trim();
            const pass = document.getElementById('password').value;
            if(!ALLOWED_USERS.includes(email.toLowerCase())) {
                document.getElementById('auth-error').innerText = "Access Denied 🔒";
                return;
            }
            try { await signInWithEmailAndPassword(auth, email, pass); } 
            catch (e) { document.getElementById('auth-error').innerText = "Wrong secret, Bebu ❤️"; }
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('app-content').style.display = 'block';
                initApp();
                requestLocation();
            } else {
                document.getElementById('auth-screen').classList.remove('hidden');
                document.getElementById('app-content').style.display = 'none';
            }
        });

        document.getElementById('logout-btn').onclick = () => signOut(auth);

        function initApp() {
            updateCounter();
            setInterval(updateCounter, 3600000); 
            listenChat();
            listenMood();
            loadGallery();
            nav('home', document.querySelector('.nav-tab'));
        }

        // --- PREMIUM COUNTER ---
        function updateCounter() {
            const startDate = new Date("2025-10-25");
            const now = new Date();
            
            let years = now.getFullYear() - startDate.getFullYear();
            let months = now.getMonth() - startDate.getMonth();
            let days = now.getDate() - startDate.getDate();

            if (days < 0) {
                months--;
                const lastMonth = new Date(now.getFullYear(), now.getMonth(), 0);
                days += lastMonth.getDate();
            }
            if (months < 0) {
                years--;
                months += 12;
            }

            document.getElementById('count-y').innerText = years;
            document.getElementById('count-m').innerText = months;
            document.getElementById('count-d').innerText = days;
        }

        // --- LOCATION SYSTEM ---
        function requestLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(async (pos) => {
                    const { latitude, longitude } = pos.coords;
                    try {
                        const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${latitude}&lon=${longitude}`);
                        const data = await res.json();
                        currentLocation = data.address.city || data.address.town || data.address.village || "Somewhere Special";
                    } catch {
                        currentLocation = "Coordinates Hidden";
                    }
                }, () => { currentLocation = null; });
            }
        }

        // --- CHAT SYSTEM (FIXED & UPGRADED) ---
        const chatWin = document.getElementById('chat-window');
        document.getElementById('send-msg').onclick = sendMsg;
        document.getElementById('msg-input').onkeydown = (e) => { if(e.key==='Enter') sendMsg(); };

        async function sendMsg() {
            const input = document.getElementById('msg-input');
            const text = input.value.trim();
            if(!text) return;
            
            const msgData = {
                text,
                uid: auth.currentUser.uid,
                email: auth.currentUser.email,
                timestamp: serverTimestamp(),
                location: currentLocation
            };

            input.value = "";
            try { await addDoc(collection(db, "messages"), msgData); } 
            catch (e) { console.error("Send error:", e); }
        }

        function listenChat() {
            const q = query(collection(db, "messages"), orderBy("timestamp", "asc"));
            onSnapshot(q, (snap) => {
                chatWin.innerHTML = "";
                snap.forEach(d => {
                    const m = d.data();
                    if(!m.timestamp) return; // Prevent flickering of pending msgs
                    
                    const isMe = m.uid === auth.currentUser.uid;
                    const initial = m.email ? m.email.charAt(0).toUpperCase() : '❤️';
                    
                    const row = document.createElement('div');
                    row.className = `msg-row ${isMe ? 'me' : 'partner'}`;
                    
                    row.innerHTML = `
                        <div class="avatar">${initial}</div>
                        <div class="bubble ${isMe ? 'me' : 'partner'}">
                            ${m.text}
                            ${m.location ? `<span class="loc-tag">📍 ${m.location}</span>` : ''}
                        </div>
                    `;
                    chatWin.appendChild(row);
                });
                chatWin.scrollTo({ top: chatWin.scrollHeight, behavior: 'smooth' });
            });
        }

        // --- MOOD & GALLERY (PRESERVED) ---
        window.updateMood = async (emoji, el) => {
            document.querySelectorAll('.mood-btn').forEach(b => {
                b.style.borderColor = 'transparent';
                b.style.background = 'white';
            });
            el.style.borderColor = 'var(--primary)';
            el.style.background = 'var(--bg-soft)';
            await setDoc(doc(db, "moods", auth.currentUser.uid), { emoji, timestamp: serverTimestamp() });
        };

        function listenMood() {
            onSnapshot(collection(db, "moods"), (snap) => {
                snap.forEach(d => {
                    if(d.id !== auth.currentUser.uid) {
                        document.getElementById('partner-emoji').innerText = d.data().emoji;
                    }
                });
            });
        }

        document.getElementById('photo-upload').onchange = async (e) => {
            const file = e.target.files[0];
            if(!file) return;
            const refImg = ref(storage, `gallery/${Date.now()}_${file.name}`);
            await uploadBytes(refImg, file);
            const url = await getDownloadURL(refImg);
            await addDoc(collection(db, "photos"), { url, timestamp: serverTimestamp() });
        };

        function loadGallery() {
            const q = query(collection(db, "photos"), orderBy("timestamp", "desc"));
            onSnapshot(q, (snap) => {
                const container = document.getElementById('gallery-container');
                container.innerHTML = "";
                snap.forEach(d => {
                    container.innerHTML += `<img src="${d.data().url}" style="width: 100%; margin-bottom: 12px; border-radius: 20px; border: 4px solid white; box-shadow: 0 4px 15px rgba(0,0,0,0.05);">`;
                });
            });
        }

        // --- NAVIGATION ---
        window.nav = (id, el) => {
            document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
            const target = document.getElementById('page-'+id);
            target.style.display = 'block';
            target.style.animation = 'fadeIn 0.4s ease';
            
            document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            
            if(id === 'chat') {
                setTimeout(() => { chatWin.scrollTop = chatWin.scrollHeight; }, 100);
            }
        };

    </script>
</body>
</html>
